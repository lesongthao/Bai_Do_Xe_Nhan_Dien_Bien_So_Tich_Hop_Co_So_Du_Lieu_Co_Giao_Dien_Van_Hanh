<text x="610.0" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#18324a"><tspan x="610.0" dy="0">Sơ đồ đấu nối phần cứng Arduino - servo - cảm biến</tspan></text><rect x="470" y="160" width="280" height="320" rx="10" fill="#e9eef5" stroke="#39566f" stroke-width="2" filter="url(#shadow)"/><text x="610.0" y="263.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#18324a"><tspan x="610.0" dy="0">ARDUINO UNO/NANO</tspan><tspan x="610.0" dy="20"></tspan><tspan x="610.0" dy="20">D9  -&gt; Servo cổng vào</tspan><tspan x="610.0" dy="20">D10 -&gt; Servo cổng ra</tspan><tspan x="610.0" dy="20">D2  &lt;- LM393 cổng vào</tspan><tspan x="610.0" dy="20">D3  &lt;- LM393 cổng ra</tspan><tspan x="610.0" dy="20">5V/GND cấp logic</tspan><tspan x="610.0" dy="20">USB Serial với máy tính</tspan></text><rect x="80" y="110" width="230" height="110" rx="10" fill="#ffe3e3" stroke="#39566f" stroke-width="2" filter="url(#shadow)"/><text x="195.0" y="144.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#18324a"><tspan x="195.0" dy="0">Servo cổng vào</tspan><tspan x="195.0" dy="20">Signal: D9</tspan><tspan x="195.0" dy="20">VCC: 5V ngoài/5V</tspan><tspan x="195.0" dy="20">GND: chung</tspan></text><rect x="80" y="300" width="230" height="110" rx="10" fill="#ffe3e3" stroke="#39566f" stroke-width="2" filter="url(#shadow)"/><text x="195.0" y="334.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#18324a"><tspan x="195.0" dy="0">Servo cổng ra</tspan><tspan x="195.0" dy="20">Signal: D10</tspan><tspan x="195.0" dy="20">VCC: 5V ngoài/5V</tspan><tspan x="195.0" dy="20">GND: chung</tspan></text><rect x="900" y="110" width="230" height="110" rx="10" fill="#fff3c4" stroke="#39566f" stroke-width="2" filter="url(#shadow)"/><text x="1015.0" y="144.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weigh