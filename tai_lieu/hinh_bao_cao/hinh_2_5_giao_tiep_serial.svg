<text x="550.0" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#18324a"><tspan x="550.0" dy="0">Giao tiếp Serial giữa máy tính và Arduino</tspan></text><rect x="80" y="135" width="250" height="160" rx="10" fill="#d9ecff" stroke="#39566f" stroke-width="2" filter="url(#shadow)"/><text x="205.0" y="203.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#18324a"><tspan x="205.0" dy="0">Máy tính</tspan><tspan x="205.0" dy="20">Phần mềm Python</tspan><tspan x="205.0" dy="20">Điều khiển trung tâm</tspan></text><rect x="770" y="135" width="250" height="160" rx="10" fill="#dff7e6" stroke="#39566f" stroke-width="2" filter="url(#shadow)"/><text x="895.0" y="203.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#18324a"><tspan x="895.0" dy="0">Arduino</tspan><tspan x="895.0" dy="20">Đọc cảm biến</tspan><tspan x="895.0" dy="20">Điều khiển servo</tspan></text><line x1="330" y1="180" x2="770" y2="180" stroke="#39566f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="550.0" y="172.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#5b6b7c"><tspan x="550.0" dy="0">VAO_MO, VAO_DONG, RA_MO, RA_DONG</tspan></text><line x1="770" y1="250" x2="330" y2="250" stroke="#39566f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="550.0" y="242.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#5b6b7c"><tspan x="550.0" dy="0">CAM_BIEN:xe_vao=1,xe_ra=0</tspan></text><rect x="405" y="355" width="290" height="90" rx="10" fill="#fff3c4" stroke="#39566f" stroke-width="2" filter="url(#shadow)"/><text x="550.0" y="388.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#18324a"><tspan x="550.0" dy="0">Kiểm tra kết nối</tspan><tspan x="550.0" dy="20">PING / PONG</tspan><tspan x="550.0" dy="20">Firmware: FW_BARIE_SMOOTH_20MS</tspan></text><path d="M 505 355 C 402.5 355, 402.5 295, 300 295" fill="none" stroke="#39566f" stroke-width="2.4" marker-end="url(#arrow)"/><path d="M 595 355 C 697.5 355, 697.5 295, 800 295" fill="none" stroke="#39566f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="550" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#5b6b7c"><tspan x="550" dy="0">Giao thức dùng chuỗi văn bản kết thúc bằng ký tự xuống dòng, dễ kiểm tra bằng Serial Monitor.</tspan></text></svg>
